<div class="profile-page">
<div class="profile-wrapper">

  <!-- Success / Error messages -->
  <div *ngIf="successMessage" class="alert alert--success">✅ {{ successMessage }}</div>
  <div *ngIf="errorMessage"   class="alert alert--error">⚠ {{ errorMessage }}</div>

  <div class="profile-card">

    <!-- Avatar -->
<div class="profile-avatar-section">
  <div class="profile-avatar" (click)="triggerAvatarUpload()">
    <img *ngIf="formData.avatarUrl" [src]="formData.avatarUrl" alt="Avatar" class="avatar-img"/>
    <span *ngIf="!formData.avatarUrl" class="avatar-initials">{{ getInitials() }}</span>
    <div class="avatar-overlay">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8z"/>
        <circle cx="8" cy="8" r="2.5"/>
      </svg>
    </div>
  </div>
  <input id="avatarInput" type="file" accept="image/*" hidden (change)="onAvatarChange($event)"/>
  <p class="avatar-hint">Cliquez pour changer la photo</p>

  <!-- ✅ Bouton supprimer avatar — visible uniquement si avatar présent -->
  <button
    *ngIf="formData.avatarUrl"
    class="btn btn--remove-avatar"
    (click)="removeAvatar()">
    🗑 Supprimer la photo
  </button>
</div>

    <!-- Form -->
    <div class="profile-form">

      <div class="form-row">
        <div class="form-group">
          <label>Prénom <span class="required">*</span></label>
          <input type="text" [(ngModel)]="formData.prenom" placeholder="Votre prénom"/>
        </div>
        <div class="form-group">
          <label>Nom <span class="required">*</span></label>
          <input type="text" [(ngModel)]="formData.nom" placeholder="Votre nom"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [value]="profile.email" disabled class="input--disabled"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" [(ngModel)]="formData.telephone" placeholder="8 chiffres"/>
        </div>
        <div class="form-group">
          <label>Poste</label>
          <input type="text" [(ngModel)]="formData.poste" placeholder="Votre poste"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Équipe</label>
          <input type="text" [value]="profile.equipe || '—'" disabled class="input--disabled"/>
        </div>
        <div class="form-group">
          <label>Date de naissance</label>
          <input type="text" [value]="profile.dateNaissance || '—'" disabled class="input--disabled"/>
        </div>
      </div>

      <!-- Actions -->
      <div class="profile-actions">
        <button class="btn btn--save" (click)="onSave()">💾 Enregistrer</button>
        <button class="btn btn--password" (click)="openPasswordModal()">🔒 Changer le mot de passe</button>
      </div>

    </div>
  </div>

  <!-- Password Modal -->
  <div class="modal-overlay" *ngIf="showPasswordModal" (click)="closePasswordModal()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>🔒 Changer le mot de passe</h2>
        <button class="modal-close" (click)="closePasswordModal()">✕</button>
      </div>

      <div class="form-group">
        <label>Mot de passe actuel</label>
        <div class="input-password">
          <input [type]="passwordVisible.current ? 'text' : 'password'"
                 [(ngModel)]="passwordForm.current" placeholder="Mot de passe actuel"/>
          <button class="eye-btn" (click)="togglePasswordVisibility('current')">
            {{ passwordVisible.current ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <div class="input-password">
          <input [type]="passwordVisible.nouveau ? 'text' : 'password'"
                 [(ngModel)]="passwordForm.nouveau" placeholder="Au moins 6 caractères"/>
          <button class="eye-btn" (click)="togglePasswordVisibility('nouveau')">
            {{ passwordVisible.nouveau ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="input-password">
          <input [type]="passwordVisible.confirm ? 'text' : 'password'"
                 [(ngModel)]="passwordForm.confirm" placeholder="Répétez le mot de passe"/>
          <button class="eye-btn" (click)="togglePasswordVisibility('confirm')">
            {{ passwordVisible.confirm ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn--cancel" (click)="closePasswordModal()">Annuler</button>
        <button class="btn btn--save" (click)="onChangePassword()">Confirmer</button>
      </div>
    </div>
  </div>

</div>
</div>
